
version: 2

models:

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique

      - name: customer_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

  - name: stg_order_items
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique

  - name: stg_stores
    columns:
      - name: store_id
        tests:
          - not_null
          - unique

  - name: stg_suppliers
    columns:
      - name: supplier_id
        tests:
          - not_null
          - unique